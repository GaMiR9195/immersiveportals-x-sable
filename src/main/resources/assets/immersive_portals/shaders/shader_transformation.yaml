---
configs:
  - comment: For vanilla terrain rendering
    type: vs
    affectedShaders:
      - rendertype_solid
      - rendertype_cutout
      - rendertype_cutout_mipped
      - rendertype_translucent
      # NOTE: previous attempt to add Sable's 'terrain_solid' etc. shaders here
      # caused an Iris shader compile error: "undefined variable Position".
      # Those shaders use Iris/Veil attribute conventions, not vanilla's
      # `in vec3 Position`. They need a separate transformation entry below
      # that targets their actual attribute layout, but we don't yet know
      # what that layout is. Reverted to keep the world functional while we
      # find the correct injection pattern.
    transformations:
      - pattern: |-
          void ( )*main( )*\(( )*( )*\)( )*(
          )*\{
        replacement: |-
          uniform vec4 iportal_ClippingEquation;
          void main() {
              gl_ClipDistance[0] = dot(Position.xyz + ChunkOffset, iportal_ClippingEquation.xyz) +
                  iportal_ClippingEquation.w;
    debugOutput: false
  - comment: For portal area rendering and entity rendering and particle
    type: vs
    affectedShaders:
      - rendertype_entity_solid
      - rendertype_entity_cutout
      - rendertype_entity_cutout_no_cull
      - rendertype_entity_cutout_no_cull_z_offset
      - rendertype_item_entity_translucent_cull
      - rendertype_entity_translucent_cull
      - rendertype_entity_translucent
      - rendertype_entity_smooth_cutout
      - rendertype_beacon_beam",
      - rendertype_entity_translucent_emissive
      - rendertype_entity_translucent_cull
      - portal_area
      - particle
    transformations:
      - pattern: |-
          void ( )*main( )*\(( )*( )*\)( )*(
          )*\{
        replacement: |-
          uniform vec4 iportal_ClippingEquation;
          void main() {
              gl_ClipDistance[0] = dot(Position.xyz, iportal_ClippingEquation.xyz) + 
                  iportal_ClippingEquation.w;
    debugOutput: false
  - comment: For iris+sodium
    type: vs
    affectedShaders:
      - iris_gbuffers_terrain
      - iris_gbuffers_water
    transformations:
      - pattern: |-
          void ( )*main( )*\(( )*( )*\)( )*(
          )*\{
        replacement: |-
          uniform vec4 iportal_ClippingEquation;
          void main() {
      - pattern: "\\}(?![\\S\\s]*\\})"
        # match the last } ([\S\s] matches any character). use the modelview-transformed coordinate
        replacement: |-
          gl_ClipDistance[0] = dot(
              (iris_ModelViewMatrix * getVertexPosition()).xyz, iportal_ClippingEquation.xyz
          ) + iportal_ClippingEquation.w;
          }
    debugOutput: false
  - comment: |-
      For Iris's glsl-transformer-rewritten Sodium chunk shaders. When a player
      has Iris + Sodium + a shaderpack loaded, the shaderpack's gbuffers_terrain
      vertex source is passed through iris.glsl-transformer which rewrites all
      attribute / uniform references with the `iris_` prefix. The runtime shader
      ID is "terrain_solid" / "terrain_cutout" / "terrain_translucent" matching
      Sodium's DefaultTerrainRenderPasses, but the source uses iris_Position /
      iris_ChunkOffset / iris_ModelViewMat / gbufferModelViewInverse.

      Computing the camera-relative world position via this path works for both
      Sable sub-level rendering (where iris_ModelViewMat = frustum * R_subLevel
      and iris_ChunkOffset bakes the subLevel translation pre-rotated) AND
      vanilla terrain rendering -- in both cases the chain
      `gbufferModelViewInverse * iris_ModelViewMat * (iris_Position + iris_ChunkOffset)`
      produces world-space-relative-to-camera, which is what
      iportal_ClippingEquation lives in.
    type: vs
    affectedShaders:
      - terrain_solid
      - terrain_cutout
      - terrain_translucent
      # Entity shaders. The user's IPL-SHADER-DUMP from a shaderpack run confirmed
      # entities_* use the exact same Iris-rewritten attribute layout as terrain_*:
      # iris_Position + iris_ChunkOffset, iris_ModelViewMat, gbufferModelViewInverse.
      # So the same chain `gbufferModelViewInverse * iris_ModelViewMat * vec4(iris_Position
      # + iris_ChunkOffset, 1.0)` produces camera-relative world coords for entity
      # vertices (the per-entity model translation gets folded into iris_ChunkOffset).
      # Adding them here fixes IP's slot 0 clip (iportal_ClippingEquation) for block
      # entities through portal-through views -- the previously-unclipped chest case --
      # plus our slot 1 for any sub-level block entities we'll bracket separately.
      - entities_solid
      - entities_cutout
      - entities_translucent
    transformations:
      - pattern: |-
          void ( )*main( )*\(( )*( )*\)( )*(
          )*\{
        replacement: |-
          uniform vec4 iportal_ClippingEquation;
          uniform vec4 ipl_subLevelClipEquation;
          void main() {
              vec3 _ipl_worldPos = (gbufferModelViewInverse * iris_ModelViewMat * vec4(iris_Position + iris_ChunkOffset, 1.0)).xyz;
              gl_ClipDistance[0] = dot(_ipl_worldPos, iportal_ClippingEquation.xyz) + iportal_ClippingEquation.w;
              gl_ClipDistance[1] = dot(_ipl_worldPos, ipl_subLevelClipEquation.xyz) + ipl_subLevelClipEquation.w;
    debugOutput: false
  - comment: For sodium
    type: vs
    affectedShaders:
      - sodium:blocks/block_layer_opaque.vsh
    transformations:
      - pattern: |-
          void ( )*main( )*\(( )*( )*\)( )*(
          )*\{
        replacement:
          uniform vec4 iportal_ClippingEquation;
          void main() {
      - pattern: "\\}(?![\\S\\s]*\\})"
        # match the last } ([\S\s] matches any character). use the modelview-transformed coordinate
        replacement: |-
          gl_ClipDistance[0] = dot(
              (u_ModelViewMatrix * vec4(position, 1.0)).xyz, iportal_ClippingEquation.xyz
          ) + iportal_ClippingEquation.w;
          }
    debugOutput: false
